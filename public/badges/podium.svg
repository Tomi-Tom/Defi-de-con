<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Podium blocks -->
  <!-- 2nd place -->
  <rect x="4" y="36" width="18" height="22" rx="2" fill="#00ff87" opacity="0.4" stroke="#00ff87" stroke-width="1.5"/>
  <!-- 1st place -->
  <rect x="23" y="26" width="18" height="32" rx="2" fill="#00ff87" opacity="0.7" stroke="#00ff87" stroke-width="1.5"/>
  <!-- 3rd place -->
  <rect x="42" y="42" width="18" height="16" rx="2" fill="#00ff87" opacity="0.3" stroke="#00ff87" stroke-width="1.5"/>
  <!-- Position numbers -->
  <text x="13" y="53" font-family="monospace" font-size="10" fill="#00ff87" text-anchor="middle" opacity="0.9">2</text>
  <text x="32" y="53" font-family="monospace" font-size="10" fill="#001a0e" text-anchor="middle" font-weight="bold">1</text>
  <text x="51" y="53" font-family="monospace" font-size="10" fill="#00ff87" text-anchor="middle" opacity="0.9">3</text>
  <!-- Crown on 1st -->
  <polygon points="32,10 28,18 32,15 36,18" fill="#00ff87" opacity="0.9"/>
  <circle cx="28" cy="18" r="2" fill="#00ff87" opacity="0.9"/>
  <circle cx="32" cy="15" r="2" fill="#00ff87"/>
  <circle cx="36" cy="18" r="2" fill="#00ff87" opacity="0.9"/>
</svg>
